services:
  redis:
    image: redis:7-alpine
    container_name: medtrack-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - medtrack-net

  flask-api:
    build:
      context: ./flask-api
      dockerfile: Dockerfile
    container_name: medtrack-flask-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      PGHOST: ${PGHOST:-}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${PGDATABASE:-postgres}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-}
      DB_SSLMODE: ${DB_SSLMODE:-require}
      REDIS_URL: ${REDIS_URL:-}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_SSL: ${REDIS_SSL:-false}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-900}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-43200}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - medtrack-net

  ai-worker:
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    container_name: medtrack-ai-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      PGHOST: ${PGHOST:-}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${PGDATABASE:-postgres}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-}
      DB_SSLMODE: ${DB_SSLMODE:-require}
      SCAN_FETCH_LIMIT: ${SCAN_FETCH_LIMIT:-1000}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-300}
      MAX_SPEED_KMH: ${MAX_SPEED_KMH:-900}
      DBSCAN_EPS_KM: ${DBSCAN_EPS_KM:-15}
      DBSCAN_MIN_SAMPLES: ${DBSCAN_MIN_SAMPLES:-4}
      ALERT_DEDUP_MINUTES: ${ALERT_DEDUP_MINUTES:-30}
    networks:
      - medtrack-net

volumes:
  redis_data:

networks:
  medtrack-net:
    driver: bridge
